apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantum-backend
  namespace: quantum
  labels:
    app: quantum-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quantum-backend
  template:
    metadata:
      labels:
        app: quantum-backend
      annotations:
        # Exposes the pod endpoints to Prometheus scrapers
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: backend
        image: project-quantum-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: "250m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        # Probes check if the FastAPI container is alive and ready
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 45
          periodSeconds: 20
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 5
        env:
        - name: PORT
          value: "8000"
        # Mount an emptyDir to store logs inside the pod dynamically
        volumeMounts:
        - name: backend-logs
          mountPath: /app/logs
      volumes:
      - name: backend-logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: quantum-backend-service
  namespace: quantum
  labels:
    app: quantum-backend
spec:
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: quantum-backend
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quantum-backend-hpa
  namespace: quantum
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quantum-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
