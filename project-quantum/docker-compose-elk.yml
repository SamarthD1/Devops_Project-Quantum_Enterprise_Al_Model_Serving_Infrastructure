version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: quantum-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - cluster.name=quantum-elk-cluster
      - node.name=quantum-es-node-01
      - network.host=0.0.0.0
      - http.port=9200
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - quantum-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: quantum-logstash
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - quantum-logstash-config:/usr/share/logstash/pipeline/:ro
      - quantum-logs:/app/logs:ro
    depends_on:
      - elasticsearch
    networks:
      - quantum-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: quantum-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=quantum-kibana
      - SERVER_PORT=5601
      - SERVER_HOST=0.0.0.0
      - ELASTICSEARCH_PINGTIMEOUT=1500
      - ELASTICSEARCH_REQUESTTIMEOUT=30000
      - I18N_LOCALE=en
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - quantum-network

networks:
  quantum-network:
    name: quantum-network
    driver: bridge

volumes:
  quantum-logs:
    name: quantum-logs
  quantum-logstash-config:
    name: quantum-logstash-config

