input {
  file {
    path => "/app/logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
  }
}

filter {
  # Parse the JSON log format output by the FastAPI backend
  json {
    source => "message"
    target => "parsed_log"
  }
  
  # Inject index mapping timestamp from backend logger
  if [parsed_log][timestamp] {
    date {
      match => [ "[parsed_log][timestamp]", "ISO8601" ]
      target => "@timestamp"
    }
  }
}

output {
  # Indices logs dynamically into Elasticsearch Node cluster
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "quantum-app-logs-%{+YYYY.MM.dd}"
  }
  
  # Also print parsed logs to stdout in container console
  stdout {
    codec => rubydebug
  }
}
